<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Card - Burrito Bowl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        /* Image placeholder */
        .card-image {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #d4a056 0%, #c0392b 50%, #8e3a1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .card-image::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .card-image-icon {
            font-size: 64px;
            margin-bottom: 4px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
        }

        .card-image-label {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Badge */
        .badge {
            position: absolute;
            top: 14px;
            left: 14px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }

        /* Card body */
        .card-body {
            padding: 24px;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1.3;
        }

        .card-restaurant {
            font-size: 14px;
            color: #6b7280;
            font-weight: 500;
            margin-top: 3px;
        }

        .card-price {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            white-space: nowrap;
        }

        /* Delivery route */
        .delivery-route {
            display: flex;
            align-items: stretch;
            gap: 14px;
            background: #f8f9fb;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .route-line {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding-top: 2px;
        }

        .route-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #c0392b;
            flex-shrink: 0;
        }

        .route-dot.destination {
            background: #27ae60;
        }

        .route-connector {
            width: 2px;
            flex: 1;
            background: repeating-linear-gradient(
                to bottom,
                #cbd5e1 0px,
                #cbd5e1 4px,
                transparent 4px,
                transparent 8px
            );
            min-height: 20px;
        }

        .route-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .route-point-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #9ca3af;
            margin-bottom: 2px;
        }

        .route-point-value {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
        }

        /* Schedule row */
        .schedule {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            background: #f0fdf4;
            border-radius: 12px;
            border: 1px solid #bbf7d0;
            margin-bottom: 20px;
        }

        .schedule-icon {
            font-size: 20px;
        }

        .schedule-text {
            font-size: 14px;
            font-weight: 600;
            color: #166534;
        }

        .schedule-text span {
            font-weight: 400;
            color: #4ade80;
            margin: 0 4px;
        }

        /* Order button */
        .order-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #c0392b, #a93226);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            letter-spacing: 0.3px;
        }

        .order-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(192, 57, 43, 0.35);
        }

        .order-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Food image placeholder -->
        <div class="card-image">
            <span class="badge">Food Delivery</span>
            <div class="card-image-icon">&#127838;</div>
            <div class="card-image-label">Burrito Bowl</div>
        </div>

        <div class="card-body">
            <!-- Title and price -->
            <div class="card-header">
                <div>
                    <div class="card-title">Burrito Bowl</div>
                    <div class="card-restaurant">Chipotle Mexican Grill</div>
                </div>
                <div class="card-price">$32.45</div>
            </div>

            <!-- Delivery route -->
            <div class="delivery-route">
                <div class="route-line">
                    <div class="route-dot"></div>
                    <div class="route-connector"></div>
                    <div class="route-dot destination"></div>
                </div>
                <div class="route-details">
                    <div>
                        <div class="route-point-label">Pickup</div>
                        <div class="route-point-value">Syracuse, NY</div>
                    </div>
                    <div>
                        <div class="route-point-label">Deliver to</div>
                        <div class="route-point-value">Jamesville, NY</div>
                    </div>
                </div>
            </div>

            <!-- Scheduled time -->
            <div class="schedule">
                <div class="schedule-icon">&#128197;</div>
                <div class="schedule-text">Today<span>|</span>9:30 AM</div>
            </div>

            <!-- Order button -->
            <button class="order-btn">Confirm Order</button>
        </div>
    </div>
</body>
</html>
